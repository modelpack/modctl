name: "modctl build"
description: "Install modctl and build a model artifact, with optional registry login."
author: "ModelPack"

inputs:
  modctl_version:
    description: "modctl version to install (for example: 0.2.0 or v0.2.0). Empty means latest release."
    required: false
    default: ""
  modelfile_path:
    description: "Path to the Modelfile used by modctl build."
    required: false
    default: "Modelfile"
  artifact_name:
    description: "Model artifact reference passed to modctl build --target."
    required: true
  context_path:
    description: "Build context path passed as the final modctl build argument."
    required: false
    default: "."
  output_remote:
    description: "Set to true to pass --output-remote to modctl build."
    required: false
    default: "false"
  plain_http:
    description: "Set to true to use plain HTTP for optional login and build operations."
    required: false
    default: "false"
  insecure:
    description: "Set to true to disable TLS verification for optional login and build operations."
    required: false
    default: "false"
  registry:
    description: "Optional registry host for modctl login (for example: ghcr.io)."
    required: false
    default: ""
  registry_username:
    description: "Optional registry username for modctl login."
    required: false
    default: ""
  registry_password:
    description: "Optional registry password or token for modctl login."
    required: false
    default: ""

outputs:
  modctl-version:
    description: "Installed modctl version without the leading v prefix."
    value: ${{ steps.install.outputs.modctl-version }}

runs:
  using: "composite"
  steps:
    - name: Validate action inputs
      shell: bash
      run: |
        set -euo pipefail

        validate_bool() {
          local name="$1"
          local value="$2"
          if [[ "$value" != "true" && "$value" != "false" ]]; then
            echo "Input '${name}' must be 'true' or 'false', got '${value}'." >&2
            exit 1
          fi
        }

        if [[ -z "${{ inputs.artifact_name }}" ]]; then
          echo "Input 'artifact_name' is required." >&2
          exit 1
        fi

        if [[ ! -f "${{ inputs.modelfile_path }}" ]]; then
          echo "Modelfile not found at '${{ inputs.modelfile_path }}'." >&2
          exit 1
        fi

        if [[ ! -e "${{ inputs.context_path }}" ]]; then
          echo "Context path '${{ inputs.context_path }}' does not exist." >&2
          exit 1
        fi

        validate_bool "output_remote" "${{ inputs.output_remote }}"
        validate_bool "plain_http" "${{ inputs.plain_http }}"
        validate_bool "insecure" "${{ inputs.insecure }}"

        registry="${{ inputs.registry }}"
        username="${{ inputs.registry_username }}"
        password="${{ inputs.registry_password }}"
        if [[ -n "$registry" || -n "$username" || -n "$password" ]]; then
          if [[ -z "$registry" || -z "$username" || -z "$password" ]]; then
            echo "Optional registry integration requires 'registry', 'registry_username', and 'registry_password' together." >&2
            exit 1
          fi
        fi

    - name: Install modctl
      id: install
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        requested_version="${{ inputs.modctl_version }}"

        if [[ -z "$requested_version" ]]; then
          release_api="https://api.github.com/repos/modelpack/modctl/releases/latest"
          if [[ -n "${GITHUB_TOKEN:-}" ]]; then
            release_json="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "$release_api")"
          else
            release_json="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              "$release_api")"
          fi
          release_tag="$(printf '%s\n' "$release_json" | grep -m1 '"tag_name":' | cut -d '"' -f4)"
          if [[ -z "$release_tag" ]]; then
            echo "Unable to resolve latest modctl release tag from GitHub API." >&2
            exit 1
          fi
        else
          if [[ "$requested_version" == v* ]]; then
            release_tag="$requested_version"
          else
            release_tag="v${requested_version}"
          fi
        fi

        version="${release_tag#v}"

        case "$(uname -s)" in
          Linux) os="linux" ;;
          Darwin) os="darwin" ;;
          *)
            echo "Unsupported runner OS: $(uname -s)" >&2
            exit 1
            ;;
        esac

        case "$(uname -m)" in
          x86_64|amd64) arch="amd64" ;;
          arm64|aarch64) arch="arm64" ;;
          *)
            echo "Unsupported runner architecture: $(uname -m)" >&2
            exit 1
            ;;
        esac

        asset="modctl-${version}-${os}-${arch}.tar.gz"
        download_url="https://github.com/modelpack/modctl/releases/download/${release_tag}/${asset}"
        tmp_dir="$(mktemp -d)"
        trap 'rm -rf "$tmp_dir"' EXIT

        curl -fsSL "$download_url" -o "${tmp_dir}/${asset}"
        tar -xzf "${tmp_dir}/${asset}" -C "$tmp_dir"

        if [[ ! -f "${tmp_dir}/modctl" ]]; then
          echo "Downloaded release archive did not contain a modctl binary." >&2
          exit 1
        fi

        install_dir="${RUNNER_TEMP}/modctl-bin"
        mkdir -p "$install_dir"
        mv "${tmp_dir}/modctl" "${install_dir}/modctl"
        chmod +x "${install_dir}/modctl"

        echo "$install_dir" >> "$GITHUB_PATH"
        echo "modctl-version=${version}" >> "$GITHUB_OUTPUT"

    - name: Login to registry
      if: ${{ inputs.registry != '' && inputs.registry_username != '' && inputs.registry_password != '' }}
      shell: bash
      run: |
        set -euo pipefail

        login_cmd=(modctl login -u "${{ inputs.registry_username }}" -p "${{ inputs.registry_password }}")
        if [[ "${{ inputs.plain_http }}" == "true" ]]; then
          login_cmd+=(--plain-http)
        fi
        if [[ "${{ inputs.insecure }}" == "true" ]]; then
          login_cmd+=(--insecure)
        fi
        login_cmd+=("${{ inputs.registry }}")

        "${login_cmd[@]}"

    - name: Build model artifact
      shell: bash
      run: |
        set -euo pipefail

        build_cmd=(modctl build -f "${{ inputs.modelfile_path }}" -t "${{ inputs.artifact_name }}")
        if [[ "${{ inputs.output_remote }}" == "true" ]]; then
          build_cmd+=(--output-remote)
        fi
        if [[ "${{ inputs.plain_http }}" == "true" ]]; then
          build_cmd+=(--plain-http)
        fi
        if [[ "${{ inputs.insecure }}" == "true" ]]; then
          build_cmd+=(--insecure)
        fi
        build_cmd+=("${{ inputs.context_path }}")

        "${build_cmd[@]}"
